name: Nightly Scout
on:
  schedule:
    - cron: '0 0,4,8 * * *' # Runs 3x nightly
  workflow_dispatch: # Allows you to press the button manually
jobs:
  run-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Scout Script
        run: python research_scout.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Save changes
        run: |
          git config user.name "ScoutBot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Scout updated memory" || echo "No changes to commit"
          git push
