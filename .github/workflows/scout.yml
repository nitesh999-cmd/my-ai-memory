name: Nightly Scout
on:
  schedule:
    - cron: '0 0,4,8 * * *' 
  workflow_dispatch: 
jobs:
  run-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # This line tells GitHub to use the newer Node.js 24 engine
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Scout Script
        run: python research_scout.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Save changes
        run: |
          git config user.name "ScoutBot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Scout updated memory" || echo "No changes to commit"
          git push
