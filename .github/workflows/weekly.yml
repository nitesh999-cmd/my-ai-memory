name: Weekly Review
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Weekly Review Script
        run: python weekly_review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Save and Commit Changes
        run: |
          git config user.name "ReviewBot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Weekly review: Promoted new learnings" || echo "No changes to commit"
          git push
